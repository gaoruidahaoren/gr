name: Build And Release Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  EXE_NAME: MeterExcelApp.exe
  ZIP_NAME: MeterExcelApp-Windows.zip

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build EXE with PyInstaller
        run: |
          .venv\Scripts\activate
          pyinstaller --noconfirm --clean --onefile --name MeterExcelApp `
            --paths . `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --collect-all openpyxl `
            --collect-all openai `
            --collect-all pydantic `
            --add-data "web;web" `
            run_local.py

      - name: Pack release files
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ env.EXE_NAME }}" -DestinationPath "dist\${{ env.ZIP_NAME }}" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeterExcelApp-Windows
          path: |
            dist/${{ env.EXE_NAME }}
            dist/${{ env.ZIP_NAME }}

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.EXE_NAME }}
            dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
